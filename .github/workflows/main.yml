name: Agentic Azure DevOps MCP & Copilot Workflow

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Instructions for the Copilot Agent (e.g., Fix bug 123 in the main branch)'
        required: true
        type: string

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Azure DevOps MCP Server
        run: |
          npm install -g @tiberriver256/mcp-server-azure-devops

      - name: Start Azure DevOps MCP Server
        run: |
          # The MCP server will start and listen on standard I/O for the agent
          npx -y @tiberriver256/mcp-server-azure-devops &> ado-mcp.log &
          echo "Azure DevOps MCP Server started..."

      - name: Set up Copilot Environment and CLI
        run: |
          # Install Copilot CLI
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Ask Copilot Agent to do work
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot -p "Fix a bug and open a pull request"
